name: restock-monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # 30분마다 세션 시작 (세션 안에서 60초 간격 확인)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 32
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python restock_monitor.py
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
